name: Multi-Redis Keep-Alive

on:
  schedule:
    # 每 6 小时运行一次
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  ping-redis:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install redis

      - name: Run Python Keep-Alive Script
        # 把你的多个 Secret 映射到环境变量中
        env:
          REDIS_URL_1: ${{ secrets.REDIS_URL_1 }}    #gmail
          REDIS_URL_2: ${{ secrets.REDIS_URL_GMAIL2 }}
          REDIS_URL_3: ${{ secrets.REDIS_URL_15QQ1 }}
          REDIS_URL_4: ${{ secrets.REDIS_URL_15QQ2 }}
          REDIS_URL_5: ${{ secrets.REDIS_URL_47QQ1 }}
          REDIS_URL_6: ${{ secrets.REDIS_URL_PROTON1 }}
          REDIS_URL_7: ${{ secrets.REDIS_URL_aivan_gmail }}
        run: |
          python -c "
          import redis, os, datetime

          # 将所有需要的环境变量名放在列表里
          env_vars =['REDIS_URL_1', 'REDIS_URL_2', 'REDIS_URL_3', 'REDIS_URL_4', 'REDIS_URL_5', 'REDIS_URL_6', 'REDIS_URL_7']
          
          for var_name in env_vars:
              url = os.getenv(var_name)
              if not url:
                  continue # 如果没配置这个 Secret，就跳过
              
              # 提取 Host 用于打印日志（隐藏密码）
              safe_name = url.split('@')[-1] if '@' in url else var_name
              print(f'\nConnecting to {safe_name}...')
              
              try:
                  r = redis.from_url(url, decode_responses=True, socket_timeout=10)
                  timestamp = datetime.datetime.now().isoformat()
                  r.set('github_actions:last_seen', timestamp)
                  print(f'✅ Success! Whisper sent at: {timestamp}.')
              except Exception as e:
                  print(f'❌ Failed to connect to {safe_name}. Error: {e}')
          "
